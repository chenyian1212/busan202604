<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busan 2026 - Cloud Flagship v6.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { --color-milk-tea: #F5EBE0; --color-cream: #FDF8F5; --color-sand: #D5BDAF; --color-brown: #6B4F4F; --color-dark-brown: #3E2C2C; }
        body { font-family: 'Noto Serif TC', serif; background-color: var(--color-cream); color: var(--color-dark-brown); -webkit-tap-highlight-color: transparent; }
        .serif-en { font-family: 'Playfair Display', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 20px rgba(107, 79, 79, 0.05); }
        .nav-btn.active { color: var(--color-dark-brown); transform: translateY(-3px); }
        .nav-btn.active::after { content: ''; position: absolute; bottom: -8px; width: 6px; height: 6px; background: var(--color-brown); border-radius: 50%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .day-btn-active { background-color: var(--color-dark-brown) !important; color: white !important; }
        .status-pill { font-size: 8px; padding: 2px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .status-online { background: #E8F5E9; color: #2E7D32; }
        .status-offline { background: #FFEBEE; color: #C62828; }
        .status-local { background: #FFF3E0; color: #E65100; }
        #toast { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: #3E2C2C; color: white; padding: 12px 24px; border-radius: 2rem; font-size: 12px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; text-align: center; }
    </style>
</head>
<body class="pb-32">
    <div id="toast">Message</div>
    <div id="lightbox" onclick="this.style.display='none'" class="fixed inset-0 bg-black/90 z-[200] hidden flex items-center justify-center p-4">
        <img id="lightbox-img" class="max-w-full max-h-full object-contain">
    </div>

    <!-- 啟動登入 -->
    <div id="cloud-overlay" class="fixed inset-0 bg-[#FDF8F5] z-[100] flex items-center justify-center p-8">
        <div class="text-center w-full max-w-sm">
            <h1 class="serif-en text-4xl mb-2 italic text-[#3E2C2C]">Busan 2026</h1>
            <p class="text-xs opacity-60 mb-10 tracking-widest uppercase text-brown/70">雲端同步版 V6.2</p>
            <input type="text" id="room-id-input" class="w-full bg-white border border-sand/30 rounded-2xl py-5 px-6 text-center text-xl font-bold text-[#3E2C2C] shadow-sm mb-6 focus:ring-2 focus:ring-brown transition-all" placeholder="輸入行程暗號">
            <button id="start-sync-btn" onclick="window.startCloudSync()" class="w-full bg-[#3E2C2C] text-white py-5 rounded-2xl font-bold tracking-[0.4em] shadow-xl active:scale-95 transition-all">START SYNC</button>
            <p id="connection-status-msg" class="text-[10px] opacity-40 mt-8 italic">提示：若顯示連線失敗，請至 Firebase 開啟匿名登入。</p>
        </div>
    </div>

    <header class="p-8 pt-12 text-center relative">
        <div class="absolute top-8 right-8" id="sync-status" onclick="window.showConnError()">
            <span class="status-pill status-local">Local Mode</span>
        </div>
        <h1 class="serif-en text-4xl font-bold tracking-widest uppercase mb-1 text-[#3E2C2C]">Busan</h1>
        <p class="text-[10px] tracking-[0.4em] opacity-40 italic font-bold">— Spring 2026 —</p>
    </header>

    <main class="px-5">
        <!-- PLAN 分頁 -->
        <section id="tab-home" class="tab-content active">
            <div id="day-selector" class="mb-6 overflow-x-auto whitespace-nowrap py-2 no-scrollbar flex items-center gap-2"></div>
            <div id="day-info" class="mb-6 px-2 text-center"></div>
            <div id="itinerary-sections" class="space-y-2 pb-10"></div>
        </section>

        <!-- WALLET 分頁 -->
        <section id="tab-wallet" class="tab-content">
            <div id="settlement-board" class="glass-card p-6 mb-6 border-t-8 border-sand">
                <h3 class="serif-en text-xl font-bold italic text-brown mb-4 text-center">Settlement Radar</h3>
                <div id="settlement-content" class="space-y-2 text-xs"></div>
            </div>
            <div class="glass-card p-6 mb-6">
                <input type="text" id="calc-display" class="w-full bg-white border border-sand/10 rounded-2xl py-5 px-6 text-right text-2xl font-bold text-brown mb-4 shadow-inner" placeholder="0" readonly>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="window.appendCalc('7')" class="bg-white p-4 rounded-xl shadow-sm font-bold">7</button>
                    <button onclick="window.appendCalc('8')" class="bg-white p-4 rounded-xl shadow-sm font-bold">8</button>
                    <button onclick="window.appendCalc('9')" class="bg-white p-4 rounded-xl shadow-sm font-bold">9</button>
                    <button onclick="window.clearCalc()" class="bg-red-50 text-red-500 p-4 rounded-xl shadow-sm font-bold">C</button>
                    <button onclick="window.appendCalc('4')" class="bg-white p-4 rounded-xl shadow-sm font-bold">4</button>
                    <button onclick="window.appendCalc('5')" class="bg-white p-4 rounded-xl shadow-sm font-bold">5</button>
                    <button onclick="window.appendCalc('6')" class="bg-white p-4 rounded-xl shadow-sm font-bold">6</button>
                    <button onclick="window.appendCalc('/')" class="bg-sand/10 p-4 rounded-xl shadow-sm font-bold">÷</button>
                    <button onclick="window.appendCalc('1')" class="bg-white p-4 rounded-xl shadow-sm font-bold">1</button>
                    <button onclick="window.appendCalc('2')" class="bg-white p-4 rounded-xl shadow-sm font-bold">2</button>
                    <button onclick="window.appendCalc('3')" class="bg-white p-4 rounded-xl shadow-sm font-bold">3</button>
                    <button onclick="window.appendCalc('*')" class="bg-sand/10 p-4 rounded-xl shadow-sm font-bold">×</button>
                    <button onclick="window.appendCalc('0')" class="bg-white p-4 rounded-xl shadow-sm font-bold">0</button>
                    <button onclick="window.appendCalc('+')" class="bg-sand/10 p-4 rounded-xl shadow-sm font-bold">+</button>
                    <button onclick="window.appendCalc('-')" class="bg-sand/10 p-4 rounded-xl shadow-sm font-bold">-</button>
                    <button onclick="window.calculateResult()" class="bg-[#3E2C2C] text-white p-4 rounded-xl shadow-sm font-bold">=</button>
                </div>
                <button onclick="window.openExpenseModal()" class="w-full bg-[#6B4F4F] text-white py-4 rounded-2xl mt-4 font-bold shadow-lg">ADD RECORD</button>
            </div>
            <div id="expense-history" class="space-y-3 pb-10"></div>
        </section>

        <!-- INFO 分頁 (內含備份功能) -->
        <section id="tab-info" class="tab-content">
            <div class="space-y-6">
                <div class="glass-card p-6 border-l-8 border-sand font-bold">
                    <p class="text-xs mb-2">✈️ 4/24 ZE988 02:35 → 06:05</p>
                    <p class="text-xs">🏨 Ramada Encore / Good Ol' Days</p>
                </div>
                <div class="glass-card p-6 border-l-8 border-green-600/30 text-center">
                    <h3 class="serif-en text-xl mb-4 font-bold italic text-green-800">Cloud & Backup</h3>
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <button onclick="window.copyFullData()" class="bg-[#6B4F4F] text-white py-3 rounded-xl text-[10px] font-bold">複製備份碼</button>
                        <button onclick="window.importFullData()" class="bg-white border border-brown/20 text-brown py-3 rounded-xl text-[10px] font-bold">還原備份碼</button>
                    </div>
                    <button onclick="window.confirmReset()" class="text-[10px] text-red-400 underline">退出房間</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-card mx-4 mb-6 px-4 py-4 flex justify-between items-center shadow-2xl z-50">
        <button onclick="window.switchTab('home')" class="nav-btn active flex flex-col items-center flex-1" id="btn-home"><i class="fa-solid fa-map-location-dot text-lg"></i><span class="text-[9px] mt-1 font-bold">PLAN</span></button>
        <button onclick="window.switchTab('wallet')" class="nav-btn flex flex-col items-center flex-1" id="btn-wallet"><i class="fa-solid fa-wallet text-lg"></i><span class="text-[9px] mt-1 font-bold">WALLET</span></button>
        <button onclick="window.switchTab('info')" class="nav-btn flex flex-col items-center flex-1" id="btn-info"><i class="fa-solid fa-circle-info text-lg"></i><span class="text-[9px] mt-1 font-bold">INFO</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 💡 哈納媽咪提供的金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyBETx2y7lHBR9hhLoRGpeyXaxxLFOb3puY",
            authDomain: "busan2026-8b7e3.firebaseapp.com",
            projectId: "busan2026-8b7e3",
            storageBucket: "busan2026-8b7e3.firebasestorage.app",
            messagingSenderId: "54612806086",
            appId: "1:54612806086:web:14fa6714f403b722b24ac7",
            measurementId: "G-SRE1WFLH0W"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const globalAppId = 'busan2026-yian-mz';
        const RATE = 42;
        
        let roomId = localStorage.getItem('busan_room_id') || "";
        let syncUnsubscribe = null;
        let lastError = "";
        
        let state = {
            currentDayIdx: 0,
            itinerary: [
                { date: "4/24 (五)", weather: {temp: "14°C", text: "晴"}, slots: { "早上": [], "午餐": [], "下午": [], "晚餐": [], "住宿": [] } },
                { date: "4/25 (六)", weather: {temp: "16°C", text: "多雲"}, slots: { "早上": [], "午餐": [], "下午": [], "晚餐": [], "住宿": [] } },
                { date: "4/26 (日)", weather: {temp: "15°C", text: "雨"}, slots: { "早上": [], "午餐": [], "下午": [], "晚餐": [], "住宿": [] } },
                { date: "4/27 (一)", weather: {temp: "17°C", text: "晴"}, slots: { "早上": [], "午餐": [], "下午": [], "晚餐": [], "住宿": [] } },
                { date: "4/28 (二)", weather: {temp: "18°C", text: "暖"}, slots: { "早上": [], "午餐": [], "下午": [], "晚餐": [], "住宿": [] } }
            ],
            expenses: [], checklist: [], memos: "", vouchers: []
        };

        const startSync = () => {
            if (!roomId || !auth.currentUser) return;
            const docRef = doc(db, 'artifacts', globalAppId, 'public', 'data', 'roomData', roomId);
            if (syncUnsubscribe) syncUnsubscribe();
            
            const status = document.getElementById('sync-status');
            syncUnsubscribe = onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    state = { ...state, ...snap.data() };
                    window.render();
                    if(status) status.innerHTML = '<span class="status-pill status-online">Connected</span>';
                } else { persistCloud(); }
            }, (err) => { 
                lastError = err.message;
                if(status) status.innerHTML = '<span class="status-pill status-offline">Sync Error</span>'; 
            });
        };

        async function persistCloud() {
            localStorage.setItem(`local_state_${roomId}`, JSON.stringify(state));
            if (!roomId || !auth.currentUser) return;
            const docRef = doc(db, 'artifacts', globalAppId, 'public', 'data', 'roomData', roomId);
            try { await setDoc(docRef, state); } catch (e) { lastError = e.message; }
        }

        window.showConnError = () => {
            if (lastError) window.showToast("錯誤訊息：" + lastError);
            else window.showToast("連線正常或處於本地模式");
        };

        window.startCloudSync = async () => {
            const input = document.getElementById('room-id-input').value.trim();
            if (!input) return window.showToast("請輸入暗號");
            roomId = input;
            localStorage.setItem('busan_room_id', roomId);
            document.getElementById('cloud-overlay').style.display = 'none';

            const local = localStorage.getItem(`local_state_${roomId}`);
            if(local) state = JSON.parse(local);
            window.render();

            try {
                await signInAnonymously(auth);
                startSync();
            } catch (e) { 
                lastError = "請檢查 Firebase 是否開啟『匿名登入』功能";
                window.showToast("連線失敗，進入本地模式"); 
            }
        };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            window.render();
        };

        window.render = () => {
            const active = document.querySelector('.nav-btn.active').id.replace('btn-', '');
            if (active === 'home') renderHome();
            else if (active === 'wallet') renderWallet();
            else if (active === 'info') renderInfo();
        };

        const renderHome = () => {
            const daySel = document.getElementById('day-selector');
            if(!daySel) return;
            daySel.innerHTML = state.itinerary.map((d, i) => `<button onclick="state.currentDayIdx=${i}; window.render();" class="px-6 py-2 rounded-full text-[10px] font-bold ${state.currentDayIdx===i?'day-btn-active shadow-md':'bg-brown/10 text-brown'}">Day ${i+1}</button>`).join('');
            const day = state.itinerary[state.currentDayIdx];
            const dinfo = document.getElementById('day-info');
            if(dinfo) dinfo.innerHTML = `<h2 class="serif-en text-3xl font-bold text-brown">${day.date}</h2><p class="text-[10px] opacity-40 font-bold uppercase text-brown/60">${day.weather.temp} · ${day.weather.text}</p>`;
        };

        const renderWallet = () => {
            let yianPaid = 0, mzPaid = 0;
            state.expenses.forEach(e => { if(e.payer==='Yian') yianPaid+=e.krw; if(e.payer==='MZ') mzPaid+=e.krw; });
            const diff = Math.abs(yianPaid - mzPaid); const bal = diff / 2;
            const content = document.getElementById('settlement-content');
            if(content) content.innerHTML = `
                <div class="flex justify-between border-b border-brown/5 pb-2"><span>Yian 已墊:</span><span class="font-bold">₩${yianPaid.toLocaleString()}</span></div>
                <div class="flex justify-between border-b border-brown/5 pb-2"><span>MZ 已墊:</span><span class="font-bold">₩${mzPaid.toLocaleString()}</span></div>
                <div class="bg-brown/5 p-4 rounded-2xl mt-4 text-center">
                    <p class="text-[11px] leading-relaxed">${yianPaid > mzPaid ? `MZ 應給 Yian ₩${Math.round(bal).toLocaleString()}` : `Yian 應給 MZ ₩${Math.round(bal).toLocaleString()}`}</p>
                </div>`;
        };

        const renderInfo = () => {}; // 資訊分頁保持靜態

        window.copyFullData = () => { 
            const el = document.createElement("textarea"); el.value = JSON.stringify(state);
            document.body.appendChild(el); el.select(); document.execCommand("copy");
            document.body.removeChild(el); window.showToast("備份碼已複製！"); 
        };
        window.importFullData = () => { 
            const c = prompt("貼上備份碼："); 
            if(c){ try { state = JSON.parse(c); persistCloud(); window.render(); window.showToast("還原成功！"); } catch(e) { window.showToast("格式錯誤"); } } 
        };
        window.confirmReset = () => { if(confirm("確定退出？")){ localStorage.removeItem('busan_room_id'); location.reload(); } };

        onAuthStateChanged(auth, (u) => { if (u && roomId) { document.getElementById('cloud-overlay').style.display = 'none'; startSync(); } });
        window.render();
    </script>
</body>
</html>
